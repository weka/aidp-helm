  aidp-observability:
  - apiVersion: v2
    appVersion: 3.2.0
    created: "2026-05-15T15:17:16.033288+10:00"
    dependencies:
    - condition: loki.enabled
      name: loki
      repository: https://grafana-community.github.io/helm-charts
      version: 13.6.2
    - condition: promtail.enabled
      name: promtail
      repository: https://grafana.github.io/helm-charts
      version: 6.17.1
    - condition: tempo.enabled
      name: tempo
      repository: https://grafana-community.github.io/helm-charts
      version: 2.1.0
    - alias: otelCollector
      condition: otelCollector.enabled
      name: opentelemetry-collector
      repository: https://open-telemetry.github.io/opentelemetry-helm-charts
      version: 0.153.0
    - alias: phoenix
      condition: phoenix.enabled
      name: phoenix-helm
      repository: oci://registry-1.docker.io/arizephoenix
      version: 7.0.6
    description: AIDP Observability umbrella — Loki + Promtail + Tempo + OTEL Collector
      + Phoenix on WEKA PVCs, alongside the App-Store-provisioned Prometheus + Grafana
